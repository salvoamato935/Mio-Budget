<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mio-Budget - Gestione Finanziaria Familiare</title>
  <style>
    :root {
      --primary-color: #2c3e50;
      --accent-color: #27ae60;
      --extra-color: #2980b9;
      --bg-color: #f4f7f6;
      --card-bg: #ffffff;
      --text-color: #333333;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1, h2, h3 {
      color: var(--primary-color);
    }

    .summary-card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      margin-bottom: 25px;
    }

    .budget-display {
      font-size: 1.8em;
      font-weight: bold;
      color: var(--accent-color);
    }

    .piani-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 15px;
    }

    .card-piano {
      background: var(--card-bg);
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      border-left: 5px solid var(--accent-color);
    }

    .progress-bar {
      background-color: #e0e0e0;
      border-radius: 10px;
      height: 15px;
      width: 100%;
      overflow: hidden;
      margin: 12px 0;
    }

    .progress-fill {
      background-color: var(--accent-color);
      height: 100%;
      width: 0%;
      transition: width 0.4s ease;
    }

    .dettagli-quote {
      font-size: 0.88em;
      color: #666;
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
    }

    .tag-extra {
      color: var(--extra-color);
      font-weight: bold;
    }

    .btn {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9em;
      margin-top: 10px;
    }

    .btn:hover {
      opacity: 0.9;
    }

    /* Modal Styling */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 10px;
      width: 100%;
      max-width: 400px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
    }

    .form-group input[type="number"], 
    .form-group input[type="text"] {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .checkbox-extra {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #f0f7ff;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #cce5ff;
    }

    .checkbox-extra input {
      margin-top: 3px;
    }

    .storico-list {
      margin-top: 15px;
      max-height: 120px;
      overflow-y: auto;
      font-size: 0.85em;
      border-top: 1px solid #eee;
      padding-top: 8px;
    }

    .storico-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Mio-Budget</h1>

  <!-- Riepilogo Budget Mensile -->
  <div class="summary-card">
    <h2>Budget Mensile Disponibile</h2>
    <div class="budget-display" id="disponibilitaBudget">€ 640.00</div>
    <small>Questo valore diminuisce solo quando effettui versamenti standard o registri spese mensili.</small>
  </div>

  <!-- Sezione Piani a Lungo Termine -->
  <section>
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h2>Piani a Lungo Termine</h2>
      <button class="btn" onclick="apriModalNuovoPiano()">+ Nuovo Piano</button>
    </div>

    <div class="piani-grid" id="pianiContainer">
      <!-- I piani verranno generati dinamicamente -->
    </div>
  </section>
</div>

<!-- MODAL PER AGGIUNGERE UN VERSAMENTO -->
<div id="modalVersamento" class="modal">
  <div class="modal-content">
    <h3>Aggiungi Quota al Piano</h3>
    <input type="hidden" id="pianoSelezionatoId">
    
    <div class="form-group">
      <label for="importoVersamento">Importo (€):</label>
      <input type="number" id="importoVersamento" placeholder="Es. 100" min="1" step="0.01">
    </div>

    <div class="form-group checkbox-extra">
      <input type="checkbox" id="checkVersamentoExtra">
      <label for="checkVersamentoExtra">
        <strong>Versamento Extra</strong>
        <span style="display:block; font-size: 0.8em; color: #555; font-weight: normal;">
          Spunta questa casella se si tratta di un'entrata straordinaria/risparmio esterno. 
          <strong>NON scalera il budget mensile.</strong>
        </span>
      </label>
    </div>

    <div style="display:flex; gap: 10px; justify-content: flex-end;">
      <button class="btn" style="background:#888;" onclick="chiudiModal('modalVersamento')">Annulla</button>
      <button class="btn" onclick="confermaVersamento()">Conferma Versamento</button>
    </div>
  </div>
</div>

<!-- MODAL PER CREARE UN NUOVO PIANO -->
<div id="modalNuovoPiano" class="modal">
  <div class="modal-content">
    <h3>Crea Nuovo Piano a Lungo Termine</h3>
    
    <div class="form-group">
      <label for="titoloPiano">Nome Obiettivo:</label>
      <input type="text" id="titoloPiano" placeholder="Es. Fondo Emergenza, Auto, ETF">
    </div>

    <div class="form-group">
      <label for="targetPiano">Target Importo (€):</label>
      <input type="number" id="targetPiano" placeholder="Es. 5000" min="1">
    </div>

    <div style="display:flex; gap: 10px; justify-content: flex-end;">
      <button class="btn" style="background:#888;" onclick="chiudiModal('modalNuovoPiano')">Annulla</button>
      <button class="btn" onclick="creaNuovoPiano()">Salva Piano</button>
    </div>
  </div>
</div>

<script>
  // STATE DELL'APPLICAZIONE
  let budgetMensileDisponibile = 640.00;

  let pianiLungoTermine = [
    {
      id: "piano_1",
      titolo: "Fondo Auto T-Cross",
      targetImporto: 5000,
      totaleVersatoBudget: 400,
      totaleVersamentiExtra: 200,
      storicoVersamenti: [
        { data: "2026-07-01", importo: 200, tipo: "BUDGET" },
        { data: "2026-07-15", importo: 200, tipo: "EXTRA" }
      ]
    },
    {
      id: "piano_2",
      titolo: "Fondo ETF Futuro",
      targetImporto: 2000,
      totaleVersatoBudget: 100,
      totaleVersamentiExtra: 0,
      storicoVersamenti: [
        { data: "2026-07-05", importo: 100, tipo: "BUDGET" }
      ]
    }
  ];

  // LOGICA E CALCOLI
  function renderizza() {
    // Aggiorna saldo disponibile UI
    document.getElementById('disponibilitaBudget').textContent = `€ ${budgetMensileDisponibile.toFixed(2)}`;

    // Renderizza Piani
    const container = document.getElementById('pianiContainer');
    container.innerHTML = '';

    pianiLungoTermine.forEach(piano => {
      const totaleAccumulato = piano.totaleVersatoBudget + piano.totaleVersamentiExtra;
      const percentuale = Math.min(100, ((totaleAccumulato / piano.targetImporto) * 100)).toFixed(1);

      let storicoHTML = piano.storicoVersamenti.map(item => `
        <div class="storico-item">
          <span>${item.data}</span>
          <span class="${item.tipo === 'EXTRA' ? 'tag-extra' : ''}">
            €${item.importo.toFixed(2)} ${item.tipo === 'EXTRA' ? '(Extra)' : '(Budget)'}
          </span>
        </div>
      `).join('');

      const card = document.createElement('div');
      card.className = 'card-piano';
      card.innerHTML = `
        <h3>${piano.titolo}</h3>
        <div class="progress-bar">
          <div class="progress-fill" style="width: ${percentuale}%;"></div>
        </div>
        <p><strong>€${totaleAccumulato.toFixed(2)}</strong> / €${piano.targetImporto.toFixed(2)} (${percentuale}%)</p>
        
        <div class="dettagli-quote">
          <span>Dal Budget: €${piano.totaleVersatoBudget.toFixed(2)}</span>
          <span class="tag-extra">Extra: €${piano.totaleVersamentiExtra.toFixed(2)}</span>
        </div>

        <button class="btn" onclick="apriModalVersamento('${piano.id}')">+ Versamento</button>

        <div class="storico-list">
          <strong>Storico:</strong>
          ${storicoHTML || '<div>Nessun versamento</div>'}
        </div>
      `;
      container.appendChild(card);
    });
  }

  // AGGIUNTA VERSAMENTO (NORMALE O EXTRA)
  function aggiungiVersamento(pianoId, importo, isExtra) {
    const piano = pianiLungoTermine.find(p => p.id === pianoId);
    if (!piano) return;

    if (isExtra) {
      // 1. VERSAMENTO EXTRA: Aumenta il progresso MA NON scala il budget
      piano.totaleVersamentiExtra += importo;
    } else {
      // 2. VERSAMENTO STANDARD: Aumenta il progresso E scala dal budget mensile
      piano.totaleVersatoBudget += importo;
      budgetMensileDisponibile -= importo;
    }

    // Registra nello storico
    piano.storicoVersamenti.unshift({
      data: new Date().toISOString().split('T')[0],
      importo: importo,
      tipo: isExtra ? 'EXTRA' : 'BUDGET'
    });

    renderizza();
  }

  // NUOVO PIANO
  function creaNuovoPiano() {
    const titolo = document.getElementById('titoloPiano').value.trim();
    const target = parseFloat(document.getElementById('targetPiano').value);

    if (!titolo || isNaN(target) || target <= 0) {
      alert("Inserisci un titolo e un target validi.");
      return;
    }

    pianiLungoTermine.push({
      id: "piano_" + Date.now(),
      titolo: titolo,
      targetImporto: target,
      totaleVersatoBudget: 0,
      totaleVersamentiExtra: 0,
      storicoVersamenti: []
    });

    chiudiModal('modalNuovoPiano');
    document.getElementById('titoloPiano').value = '';
    document.getElementById('targetPiano').value = '';
    renderizza();
  }

  // GESTIONE MODALS
  function apriModalVersamento(id) {
    document.getElementById('pianoSelezionatoId').value = id;
    document.getElementById('modalVersamento').style.display = 'flex';
  }

  function apriModalNuovoPiano() {
    document.getElementById('modalNuovoPiano').style.display = 'flex';
  }

  function chiudiModal(modalId) {
    document.getElementById(modalId).style.display = 'none';
  }

  function confermaVersamento() {
    const id = document.getElementById('pianoSelezionatoId').value;
    const importo = parseFloat(document.getElementById('importoVersamento').value);
    const isExtra = document.getElementById('checkVersamentoExtra').checked;

    if (isNaN(importo) || importo <= 0) {
      alert("Inserisci un importo valido.");
      return;
    }

    if (!isExtra && importo > budgetMensileDisponibile) {
      if (!confirm("L'importo supera la disponibilita del budget mensile. Vuoi procedere comunque?")) {
        return;
      }
    }

    aggiungiVersamento(id, importo, isExtra);

    // Reset Form & Chiudi
    document.getElementById('importoVersamento').value = '';
    document.getElementById('checkVersamentoExtra').checked = false;
    chiudiModal('modalVersamento');
  }

  // INIZIALIZZAZIONE
  renderizza();
</script>

</body>
</html>
