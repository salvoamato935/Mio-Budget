<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mio Budget Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f1f5f9">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --accent: #4f46e5;
            --accent-gradient: linear-gradient(135deg, #4f46e5, #6366f1);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        header {
            background: var(--card-bg);
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 { font-size: 18px; font-weight: 700; }

        .status-banner {
            font-size: 12px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 5px;
        }
        .status-ok { background: #dcfce7; color: #15803d; }
        .status-warn { background: #fef3c7; color: #b45309; }
        .status-alert { background: #fee2e2; color: #b91c1c; }

        .container { padding: 16px; max-width: 480px; margin: 0 auto; }
        .view { display: none; }
        .view.active { display: block; }

        #auth-screen {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-top: 40px;
            text-align: center;
        }
        #auth-screen h2 { margin-bottom: 20px; font-size: 20px; font-weight: 700; }

        .main-card {
            background: var(--accent-gradient);
            color: white;
            border-radius: 24px;
            padding: 22px;
            text-align: center;
            margin-bottom: 16px;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.1);
        }
        .main-card h2 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }

        .budget-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .mini-card { background: var(--card-bg); border-radius: 18px; padding: 14px; border: 1px solid var(--card-border); position: relative;}
        .mini-card span { font-size: 11px; color: var(--text-muted); display: block; }
        .mini-card p { font-size: 16px; font-weight: 700; }

        .section-title {
            font-size: 13px;
            color: var(--text-muted);
            margin: 20px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cassetto-row {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 8px;
            border: 1px solid var(--card-border);
        }
        .cassetto-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .cassetto-name { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14px; }
        .cassetto-dispo { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px;}

        .spesa-item {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 10px 12px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--card-border);
        }
        .spesa-info h4 { font-size: 13px; font-weight: 600; }
        .spesa-info span { font-size: 10px; color: var(--text-muted); }

        .btn-delete { background: none; border: none; color: var(--danger); width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .btn {
            background: var(--accent-gradient); color: white; border: none; padding: 12px;
            border-radius: 12px; font-weight: 600; font-size: 14px; width: 100%; cursor: pointer;
            transition: transform 0.1s ease; margin-bottom: 8px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-secondary { background: #ffffff; color: var(--text-main); border: 1px solid var(--card-border); }
        .btn-danger { background: #fee2e2; color: var(--danger); border: 1px solid #fca5a5; }

        .form-group { margin-bottom: 12px; text-align: left; }
        .form-group label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }
        .form-control { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--card-border); font-size: 14px; background: #fff;}

        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 65px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-top: 1px solid var(--card-border); display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { background: none; border: none; color: var(--text-muted); font-size: 9px; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; width: 60px;}
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 16px; }
        .nav-center-btn {
            width: 46px; height: 46px; background: var(--accent-gradient); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white; font-size: 18px;
            transform: translateY(-10px); border: none; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.3); backdrop-filter: blur(4px); z-index: 2000; align-items: flex-end;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card-bg); width: 100%; border-top-left-radius: 20px; border-top-right-radius: 20px;
            padding: 20px; animation: slideUp 0.2s ease-out; max-height: 85vh; overflow-y: auto;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .badge-btn { background: #f1f5f9; padding: 4px 8px; border-radius: 6px; font-size: 11px; color: var(--accent); font-weight: 600; border: none; cursor: pointer; }
        .setup-comparto-item { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; font-size: 13px;}
        .hidden { display: none !important; }
        .error-msg { color: #ef4444; font-size: 13px; margin-top: 8px; font-weight: 500; }
    </style>
</head>
<body>

    <header>
        <h1 id="header-title">Mio Budget 📊</h1>
        <div id="status-label" class="status-banner status-ok">🟢 Tutto sotto controllo</div>
        <div id="user-header-info" style="font-size:11px; color:var(--text-muted); margin-top:4px;" class="hidden"></div>
    </header>

    <div class="container">
        
        <!-- SCHERMATA ACCESSO -->
        <div id="auth-screen">
            <h2 id="auth-title">Bentornato!</h2>
            <div class="form-group">
                <label>La tua email</label>
                <input type="email" id="auth-email" class="form-control" placeholder="nome@esempio.it">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="auth-password" class="form-control" placeholder="••••••••">
            </div>
            <button class="btn" id="btn-auth-primary" onclick="window.gestisciAutenticazione()">Entra nel tuo Budget</button>
            <button class="btn btn-secondary" id="btn-auth-toggle" onclick="window.toggleModalitaAuth()" style="font-size:12px;">Prima volta qui? Crea un profilo</button>
            <p id="auth-error" class="error-msg"></p>
        </div>

        <!-- SCHERMATA CONFIGURAZIONE CASSETTI -->
        <div id="view-setup" class="view">
            <div class="mini-card" style="padding: 20px;">
                <h3 style="margin-bottom: 12px; text-align:center;">Organizza il tuo Mese</h3>
                
                <div class="form-group" style="margin-bottom: 20px; background: #e0f2fe; padding: 12px; border-radius: 12px; border: 1px solid #bae6fd;">
                    <label style="color:#0369a1; font-weight:700;">1. QUANTO VUOI SPENDERE QUESTO MESE? (€)</label>
                    <input type="number" id="setup-budget-totale-input" class="form-control" placeholder="Es. 1500" inputmode="decimal" style="border-color:#7dd3fc; font-size:16px; font-weight:700;">
                </div>

                <hr style="border: 0; height: 1px; background: var(--card-border); margin: 20px 0;">

                <h4 style="margin-bottom: 10px; font-size:13px; color:var(--text-main);">2. DIVIDI IL BUDGET IN CASSETTI</h4>
                <div style="background: #f8fafc; padding: 12px; border-radius: 12px; margin-bottom: 16px; border: 1px solid var(--card-border);">
                    <div class="form-group">
                        <label>Nome Cassetto</label>
                        <input type="text" id="add-comp-nome" class="form-control" placeholder="Es. Spesa Casa, Pizzeria, Auto...">
                    </div>
                    <div class="form-group">
                        <label>Importo per questo Cassetto (€)</label>
                        <input type="number" id="add-comp-budget" class="form-control" placeholder="Es. 400" inputmode="decimal">
                    </div>
                    <button class="btn btn-secondary" style="font-size:12px; padding:6px;" onclick="window.aggiungiCompartoLista()">+ Aggiungi Cassetto</button>
                </div>

                <div id="lista-comparti-setup" style="margin-bottom:16px;"></div>
                
                <div style="background:#f1f5f9; padding:10px; border-radius:8px; font-size:12px; text-align:center; font-weight:600; margin-bottom:16px;">
                    Totale Cassetti: <span id="setup-somma-comparti" style="color:var(--accent)">0,00 €</span>
                </div>

                <button class="btn" onclick="window.salvaConfigurazioneComparti()">Salva e Continua</button>
                <button class="btn btn-secondary" id="btn-annulla-setup" style="display:none;" onclick="window.chiudiModificaBudget()">Annulla</button>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div id="view-home" class="view">
            <div class="main-card">
                <p style="font-size:12px; opacity:0.9;">Quanto ti resta ancora</p>
                <h2 id="dash-disponibile">0,00 €</h2>
                <button class="badge-btn" style="color:white; background:rgba(255,255,255,0.2); margin-top:6px;" onclick="window.apriModificaBudget()"><i class="fa-solid fa-sliders"></i> Regola Budget e Cassetti</button>
            </div>

            <div class="budget-details">
                <div class="mini-card"><span>Budget Iniziale</span><p id="dash-entrate" style="color:var(--success);">0,00 €</p></div>
                <div class="mini-card"><span>Già Speso</span><p id="dash-speso" style="color:var(--danger);">0,00 €</p></div>
            </div>

            <h3 class="section-title">📊 I Tuoi Cassetti</h3>
            <div id="cassetti-container"></div>

            <h3 class="section-title">🕒 Ultime Spese</h3>
            <div id="spese-container"></div>
        </div>

    </div>

    <!-- NAVBAR IN BASSO -->
    <nav class="nav-bar" id="app-nav" style="display:none;">
        <button class="nav-item active" id="nav-btn-home" onclick="window.switchView('home', this)"><i class="fa-solid fa-wallet"></i><span>Home</span></button>
        <button class="nav-center-btn" onclick="window.apriModalNuovaSpesa()"><i class="fa-solid fa-plus"></i></button>
        <button class="nav-item" style="color:var(--danger);" onclick="window.eseguiLogout()"><i class="fa-solid fa-right-from-bracket"></i><span>Esci</span></button>
    </nav>

    <!-- MODALE SPESA -->
    <div id="modal-spesa" class="modal" onclick="window.closeModalOnBackdrop(event)">
        <div class="modal-content">
            <h3>💸 Annota una Spesa</h3>
            <div class="form-group"><label>Importo Spesa (€)</label><input type="number" id="spesa-importo" class="form-control" step="0.01" inputmode="decimal" placeholder="0.00"></div>
            <div class="form-group"><label>Descrizione</label><input type="text" id="spesa-desc" class="form-control" placeholder="Es. Spesa alimentare, Carburante..."></div>
            <div class="form-group"><label>Seleziona Cassetto</label><select id="spesa-cassetto" class="form-control"></select></div>
            <button class="btn" onclick="window.salvaSpesa()">Registra Spesa</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            onAuthStateChanged, 
            signOut 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { 
            getDatabase, 
            ref, 
            push, 
            onValue, 
            remove, 
            set 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA7UCnGi06p1HPhRPgS4LyXcbKx_LhdOsM",
            authDomain: "budget-casa-7eead.firebaseapp.com",
            databaseURL: "https://budget-casa-7eead-default-rtdb.firebaseio.com",
            projectId: "budget-casa-7eead",
            storageBucket: "budget-casa-7eead.firebasestorage.app",
            messagingSenderId: "529644674685",
            appId: "1:529644674685:web:93438c7393631bc7d4db14"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUser = null;
        let isLogin = true;
        let compartiTemp = [];
        let configCorrente = { budgetTotale: 0, comparti: [] };
        let listaSpeseCorrenti = [];

        // ESPORTAZIONE FUNZIONI GLOBALI SU WINDOW
        window.toggleModalitaAuth = function() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "Bentornato!" : "Crea un profilo";
            document.getElementById('btn-auth-primary').innerText = isLogin ? "Entra nel tuo Budget" : "Registrati subito";
            document.getElementById('btn-auth-toggle').innerText = isLogin ? "Prima volta qui? Crea un profilo" : "Hai già un profilo? Accedi";
            document.getElementById('auth-error').innerText = "";
        };

        window.gestisciAutenticazione = function() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            const errEl = document.getElementById('auth-error');
            errEl.innerText = "";

            if(!email || !password) {
                errEl.innerText = "Inserisci email e password per continuare.";
                return;
            }

            if(isLogin) {
                signInWithEmailAndPassword(auth, email, password).catch(err => errEl.innerText = "Email o password errate.");
            } else {
                createUserWithEmailAndPassword(auth, email, password).catch(err => errEl.innerText = "Errore registrazione: " + err.message);
            }
        };

        window.eseguiLogout = function() { signOut(auth); };

        window.switchView = function(viewId, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            if(btn) btn.classList.add('active');
        };

        window.closeModalOnBackdrop = function(e) {
            if(e.target.classList.contains('modal')) e.target.classList.remove('active');
        };

        window.apriModificaBudget = function() {
            document.getElementById('btn-annulla-setup').style.display = "block";
            compartiTemp = [...(configCorrente.comparti || [])];
            document.getElementById('setup-budget-totale-input').value = configCorrente.budgetTotale || "";
            renderListaSetup();
            window.switchView('setup');
        };

        window.chiudiModificaBudget = function() {
            window.switchView('home', document.getElementById('nav-btn-home'));
        };

        window.aggiungiCompartoLista = function() {
            const nomeEl = document.getElementById('add-comp-nome');
            const budgetEl = document.getElementById('add-comp-budget');
            const nome = nomeEl.value.trim();
            const budget = parseFloat(budgetEl.value) || 0;

            if(!nome) return;

            compartiTemp.push({ nome, budget });
            nomeEl.value = "";
            budgetEl.value = "";
            renderListaSetup();
        };

        window.rimuoviCompartoSetup = function(idx) {
            compartiTemp.splice(idx, 1);
            renderListaSetup();
        };

        function renderListaSetup() {
            const container = document.getElementById('lista-comparti-setup');
            container.innerHTML = "";
            let somma = 0;
            compartiTemp.forEach((c, idx) => {
                somma += c.budget;
                container.innerHTML += `
                    <div class="setup-comparto-item">
                        <span><strong>${c.nome}</strong>: ${c.budget.toFixed(2)} €</span>
                        <button class="btn-delete" onclick="window.rimuoviCompartoSetup(${idx})"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
            });
            document.getElementById('setup-somma-comparti').innerText = somma.toFixed(2) + " €";
        }

        window.salvaConfigurazioneComparti = function() {
            if(!currentUser) return;
            const tot = parseFloat(document.getElementById('setup-budget-totale-input').value) || 0;
            const dataToSave = { budgetTotale: tot, comparti: compartiTemp };

            set(ref(db, `users/${currentUser.uid}/config`), dataToSave).then(() => {
                window.switchView('home', document.getElementById('nav-btn-home'));
            });
        };

        window.apriModalNuovaSpesa = function() {
            document.getElementById('spesa-importo').value = "";
            document.getElementById('spesa-desc').value = "";
            document.getElementById('modal-spesa').classList.add('active');
        };

        window.salvaSpesa = function() {
            if(!currentUser) return;
            const importo = parseFloat(document.getElementById('spesa-importo').value);
            const desc = document.getElementById('spesa-desc').value.trim();
            const cassetto = document.getElementById('spesa-cassetto').value;

            if(!importo || !desc) return;

            const nuovaSpesa = { importo, desc, cassetto, data: new Date().toISOString() };

            push(ref(db, `users/${currentUser.uid}/spese`), nuovaSpesa).then(() => {
                document.getElementById('modal-spesa').classList.remove('active');
            });
        };

        window.eliminaSpesa = function(key) {
            if(!currentUser) return;
            remove(ref(db, `users/${currentUser.uid}/spese/${key}`));
        };

        // ASCOLTO FIREBASE IN TEMPO REALE
        onAuthStateChanged(auth, (user) => {
            if(user) {
                currentUser = user;
                document.getElementById('auth-screen').style.display = "none";
                document.getElementById('app-nav').style.display = "flex";
                document.getElementById('user-header-info').innerText = user.email;
                document.getElementById('user-header-info').classList.remove('hidden');

                // Leggi Configurazione
                onValue(ref(db, `users/${user.uid}/config`), (snap) => {
                    const data = snap.val();
                    if(data) {
                        configCorrente = data;
                        compartiTemp = data.comparti || [];
                        aggiornaSelectCassetti(data.comparti || []);
                    } else {
                        window.switchView('setup');
                    }
                    aggiornaUI();
                });

                // Leggi Spese
                onValue(ref(db, `users/${user.uid}/spese`), (snap) => {
                    const data = snap.val();
                    listaSpeseCorrenti = [];
                    if(data) {
                        Object.keys(data).forEach(key => {
                            listaSpeseCorrenti.push({ key, ...data[key] });
                        });
                    }
                    aggiornaUI();
                });

                window.switchView('home', document.getElementById('nav-btn-home'));

            } else {
                currentUser = null;
                document.getElementById('auth-screen').style.display = "block";
                document.getElementById('app-nav').style.display = "none";
                document.getElementById('user-header-info').classList.add('hidden');
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            }
        });

        function aggiornaSelectCassetti(comparti) {
            const select = document.getElementById('spesa-cassetto');
            select.innerHTML = '<option value="generale">Generale (Nessun Cassetto)</option>';
            comparti.forEach(c => {
                select.innerHTML += `<option value="${c.nome}">${c.nome}</option>`;
            });
        }

        function aggiornaUI() {
            let totaleSpeso = 0;
            let spesoPerCassetto = {};

            listaSpeseCorrenti.forEach(s => {
                totaleSpeso += s.importo;
                spesoPerCassetto[s.cassetto] = (spesoPerCassetto[s.cassetto] || 0) + s.importo;
            });

            const budgetTotale = configCorrente.budgetTotale || 0;
            const disponibile = budgetTotale - totaleSpeso;

            document.getElementById('dash-entrate').innerText = budgetTotale.toFixed(2) + " €";
            document.getElementById('dash-speso').innerText = totaleSpeso.toFixed(2) + " €";
            document.getElementById('dash-disponibile').innerText = disponibile.toFixed(2) + " €";

            // Render Cassetti
            const cassettiContainer = document.getElementById('cassetti-container');
            cassettiContainer.innerHTML = "";
            (configCorrente.comparti || []).forEach(c => {
                const speso = spesoPerCassetto[c.nome] || 0;
                const rimasto = c.budget - speso;
                cassettiContainer.innerHTML += `
                    <div class="cassetto-row">
                        <div class="cassetto-header">
                            <span class="cassetto-name">${c.nome}</span>
                            <span class="cassetto-dispo" style="color:${rimasto < 0 ? 'var(--danger)' : 'var(--text-main)'}">${rimasto.toFixed(2)} €</span>
                        </div>
                        <div style="font-size:11px; color:var(--text-muted)">Budget: ${c.budget.toFixed(2)} € | Speso: ${speso.toFixed(2)} €</div>
                    </div>
                `;
            });

            // Render Ultime Spese
            const speseContainer = document.getElementById('spese-container');
            speseContainer.innerHTML = "";
            if(listaSpeseCorrenti.length === 0) {
                speseContainer.innerHTML = '<p style="font-size:12px; color:var(--text-muted); text-align:center;">Nessuna spesa inserita finora.</p>';
            } else {
                listaSpeseCorrenti.slice().reverse().forEach(s => {
                    speseContainer.innerHTML += `
                        <div class="spesa-item">
                            <div class="spesa-info">
                                <h4>${s.desc}</h4>
                                <span>Cassetto: ${s.cassetto}</span>
                            </div>
                            <div style="display:flex; align-items:center; gap:8px;">
                                <strong style="color:var(--danger)">-${s.importo.toFixed(2)} €</strong>
                                <button class="btn-delete" onclick="window.eliminaSpesa('${s.key}')"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    `;
                });
            }
        }
    </script>
</body>
