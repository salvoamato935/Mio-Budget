<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mio-Budget</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased min-h-screen">

    <!-- SCHERMATA LOGIN / REGISTRAZIONE -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
            <div class="text-center mb-8">
                <div class="bg-blue-600 text-white w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl shadow-lg">
                    <i class="fa-solid fa-wallet"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900" id="auth-title">Accedi a Mio-Budget</h1>
                <p class="text-sm text-gray-500 mt-1" id="auth-subtitle">Inserisci le tue credenziali per continuare</p>
            </div>

            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="auth-email" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="nome@esempio.it">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="auth-password" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="••••••••">
                </div>
                
                <p id="auth-error" class="text-red-500 text-xs font-semibold mt-1 hidden"></p>

                <button type="submit" id="auth-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg shadow-md hover:shadow-lg transition flex items-center justify-center gap-2">
                    <span id="auth-btn-text">Accedi</span>
                    <i class="fa-solid fa-arrow-right text-sm"></i>
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-gray-600">
                <span id="auth-toggle-text">Non hai ancora un account?</span>
                <button type="button" id="auth-toggle-btn" class="text-blue-600 font-semibold hover:underline ml-1">Registrati</button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD PRINCIPALE (Nascosta prima del login) -->
    <div id="app-screen" class="hidden min-h-screen flex flex-col">
        <!-- Header -->
        <header class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white p-2 rounded-lg">
                    <i class="fa-solid fa-wallet text-xl"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800">Mio-Budget</h2>
            </div>
            <div class="flex items-center gap-4">
                <span id="user-display" class="text-sm font-medium text-gray-600 hidden md:inline"></span>
                <button id="logout-btn" class="text-gray-500 hover:text-red-600 p-2 rounded-lg hover:bg-gray-100 transition" title="Esci">
                    <i class="fa-solid fa-right-from-bracket text-lg"></i>
                </button>
            </div>
        </header>

        <!-- Contenuto Dashboard -->
        <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 space-y-6">
            <!-- Riepilogo Card -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 font-medium">Entrate</p>
                        <h3 id="total-income" class="text-2xl font-bold text-green-600 mt-1">€ 0,00</h3>
                    </div>
                    <div class="bg-green-100 text-green-600 p-3 rounded-full">
                        <i class="fa-solid fa-arrow-down text-xl"></i>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 font-medium">Uscite</p>
                        <h3 id="total-expense" class="text-2xl font-bold text-red-600 mt-1">€ 0,00</h3>
                    </div>
                    <div class="bg-red-100 text-red-600 p-3 rounded-full">
                        <i class="fa-solid fa-arrow-up text-xl"></i>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 font-medium">Bilancio Totale</p>
                        <h3 id="total-balance" class="text-2xl font-bold text-blue-600 mt-1">€ 0,00</h3>
                    </div>
                    <div class="bg-blue-100 text-blue-600 p-3 rounded-full">
                        <i class="fa-solid fa-scale-balanced text-xl"></i>
                    </div>
                </div>
            </div>

            <!-- Form e Movimenti -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Form Nuova Transazione -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 h-fit">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">Aggiungi Movimento</h3>
                    <form id="transaction-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tipo</label>
                            <select id="trans-type" class="w-full p-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="expense">Uscita</option>
                                <option value="income">Entrata</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Descrizione</label>
                            <input type="text" id="trans-desc" required placeholder="Es. Spesa al supermercato" class="w-full p-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Importo (€)</label>
                            <input type="number" step="0.01" id="trans-amount" required placeholder="0.00" class="w-full p-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition shadow">
                            Salva Movimento
                        </button>
                    </form>
                </div>

                <!-- Lista Transazioni -->
                <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">Ultimi Movimenti</h3>
                    <div class="overflow-x-auto">
                        <ul id="transactions-list" class="divide-y divide-gray-100">
                            <li class="py-4 text-center text-gray-400 text-sm">Nessun movimento presente</li>
                        </ul>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Script Firebase e App -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            onAuthStateChanged, 
            signOut 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { 
            getDatabase, 
            ref, 
            push, 
            onValue, 
            remove 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIGURAZIONE FIREBASE REALE
        const firebaseConfig = {
            apiKey: "AIzaSyA7UCnGi06p1HPhRPgS4LyXcbKx_LhdOsM",
            authDomain: "budget-casa-7eead.firebaseapp.com",
            databaseURL: "https://budget-casa-7eead-default-rtdb.firebaseio.com",
            projectId: "budget-casa-7eead",
            storageBucket: "budget-casa-7eead.firebasestorage.app",
            messagingSenderId: "529644674685",
            appId: "1:529644674685:web:93438c7393631bc7d4db14"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Elementi DOM
        const authScreen = document.getElementById('auth-screen');
        const appScreen = document.getElementById('app-screen');
        const authForm = document.getElementById('auth-form');
        const authEmail = document.getElementById('auth-email');
        const authPassword = document.getElementById('auth-password');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const authBtnText = document.getElementById('auth-btn-text');
        const authToggleBtn = document.getElementById('auth-toggle-btn');
        const authToggleText = document.getElementById('auth-toggle-text');
        const authError = document.getElementById('auth-error');
        const logoutBtn = document.getElementById('logout-btn');
        const userDisplay = document.getElementById('user-display');

        let isLoginMode = true;

        // Switch tra Login e Registrazione
        authToggleBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authTitle.innerText = isLoginMode ? "Accedi a Mio-Budget" : "Crea un Account";
            authSubtitle.innerText = isLoginMode ? "Inserisci le tue credenziali per continuare" : "Registrati per iniziare a tracciare i tuoi costi";
            authBtnText.innerText = isLoginMode ? "Accedi" : "Registrati";
            authToggleText.innerText = isLoginMode ? "Non hai ancora un account?" : "Hai già un account?";
            authToggleBtn.innerText = isLoginMode ? "Registrati" : "Accedi";
            authError.classList.add('hidden');
        });

        // Gestione Login / Registrazione
        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = authEmail.value.trim();
            const password = authPassword.value;
            authError.classList.add('hidden');

            if (isLoginMode) {
                signInWithEmailAndPassword(auth, email, password)
                    .catch((err) => {
                        authError.innerText = "Errore d'accesso: " + err.message;
                        authError.classList.remove('hidden');
                        alert("IMPOSSIBILE ACCEDERE:\n" + err.message);
                    });
            } else {
                createUserWithEmailAndPassword(auth, email, password)
                    .then(() => {
                        alert("Account creato con successo! Accesso in corso...");
                    })
                    .catch((err) => {
                        authError.innerText = "Errore registrazione: " + err.message;
                        authError.classList.remove('hidden');
                        alert("ERRORE REGISTRAZIONE:\n" + err.message);
                    });
            }
        });

        // Controllo Stato Autenticazione (Cambio Schermata)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                authScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                userDisplay.innerText = user.email;
                loadTransactions(user.uid);
            } else {
                appScreen.classList.add('hidden');
                authScreen.classList.remove('hidden');
            }
        });

        // Logout
        logoutBtn.addEventListener('click', () => {
            signOut(auth);
        });

        // Gestione Transazioni
        const transactionForm = document.getElementById('transaction-form');
        const transType = document.getElementById('trans-type');
        const transDesc = document.getElementById('trans-desc');
        const transAmount = document.getElementById('trans-amount');
        const transactionsList = document.getElementById('transactions-list');
        const totalIncomeEl = document.getElementById('total-income');
        const totalExpenseEl = document.getElementById('total-expense');
        const totalBalanceEl = document.getElementById('total-balance');

        transactionForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            if (!user) return;

            const newTrans = {
                type: transType.value,
                desc: transDesc.value,
                amount: parseFloat(transAmount.value),
                date: new Date().toISOString()
            };

            push(ref(db, `users/${user.uid}/transactions`), newTrans)
                .then(() => {
                    transactionForm.reset();
                })
                .catch((err) => {
                    alert("Errore salvataggio dati: " + err.message);
                });
        });

        function loadTransactions(userId) {
            const transRef = ref(db, `users/${userId}/transactions`);
            onValue(transRef, (snapshot) => {
                const data = snapshot.val();
                transactionsList.innerHTML = '';

                if (!data) {
                    transactionsList.innerHTML = '<li class="py-4 text-center text-gray-400 text-sm">Nessun movimento presente</li>';
                    totalIncomeEl.innerText = '€ 0,00';
                    totalExpenseEl.innerText = '€ 0,00';
                    totalBalanceEl.innerText = '€ 0,00';
                    return;
                }

                let totalIncome = 0;
                let totalExpense = 0;

                Object.keys(data).forEach((key) => {
                    const item = data[key];
                    const isIncome = item.type === 'income';

                    if (isIncome) {
                        totalIncome += item.amount;
                    } else {
                        totalExpense += item.amount;
                    }

                    const li = document.createElement('li');
                    li.className = 'py-3 flex justify-between items-center border-b border-gray-50 last:border-0';
                    li.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="p-2 rounded-lg ${isIncome ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                                <i class="fa-solid ${isIncome ? 'fa-arrow-down' : 'fa-arrow-up'} text-sm"></i>
                            </div>
                            <div>
                                <p class="font-medium text-gray-800 text-sm">${item.desc}</p>
                                <p class="text-xs text-gray-400">${new Date(item.date).toLocaleDateString('it-IT')}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="font-bold text-sm ${isIncome ? 'text-green-600' : 'text-red-600'}">
                                ${isIncome ? '+' : '-'} € ${item.amount.toFixed(2)}
                            </span>
                            <button onclick="deleteTrans('${key}')" class="text-gray-300 hover:text-red-500 transition">
                                <i class="fa-solid fa-trash-can text-sm"></i>
                            </button>
                        </div>
                    `;
                    transactionsList.prepend(li);
                });

                const balance = totalIncome - totalExpense;
                totalIncomeEl.innerText = `€ ${totalIncome.toFixed(2)}`;
                totalExpenseEl.innerText = `€ ${totalExpense.toFixed(2)}`;
                totalBalanceEl.innerText = `€ ${balance.toFixed(2)}`;
            });
        }

        window.deleteTrans = (key) => {
            const user = auth.currentUser;
            if (user) {
                remove(ref(db, `users/${user.uid}/transactions/${key}`));
            }
        };
    </script>
</body>
</html>
